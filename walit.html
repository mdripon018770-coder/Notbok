<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f3f7;
}

.header{
background:linear-gradient(90deg,#6a5af9,#5b4de0);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
position:relative;
}

.back{
position:absolute;
left:15px;
top:15px;
background:white;
color:#6a5af9;
width:40px;
height:40px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.balance-box{
margin:20px;
padding:25px;
border-radius:18px;
background:linear-gradient(90deg,#6a5af9,#5b4de0);
color:white;
}

.balance-box h3{
margin:0;
font-size:18px;
}

.balance{
font-size:34px;
margin-top:10px;
font-weight:bold;
}

.row{
display:flex;
gap:15px;
margin:20px;
}

.small-box{
flex:1;
background:#eaeaea;
padding:18px;
border-radius:12px;
}

.small-box h4{
margin:0;
font-size:15px;
color:#555;
}

.small-box p{
margin-top:8px;
font-size:22px;
font-weight:bold;
}

.actions{
display:flex;
justify-content:space-around;
background:#eaeaea;
margin:20px;
padding:20px;
border-radius:15px;
}

.action{
text-align:center;
}

.icon{
width:55px;
height:55px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
margin:auto;
}

.deposit{
background:#ffa500;
}

.withdraw{
background:#ff4f6d;
}

.dephistory{
background:#6a5af9;
}

.withhistory{
background:#28c76f;
}

.action p{
margin-top:8px;
font-size:14px;
font-weight:600;
}

</style>
</head>

<body>

<div class="header">

<div class="back">
<i class="fa fa-arrow-left"></i>
</div>

Wallet

</div>


<div class="balance-box">

<h3>Total balance</h3>

<div class="balance">৳0.00</div>

</div>


<div class="row">

<div class="small-box">
<h4>Total deposit amount</h4>
<p>৳0.00</p>
</div>

<div class="small-box">
<h4>Total withdraw amount</h4>
<p>৳0.00</p>
</div>

</div>


<div class="actions">

<div class="action">
<div class="icon deposit">
<i class="fa fa-plus"></i>
</div>
<p>Deposit</p>
</div>

<div class="action">
<div class="icon withdraw">
<i class="fa fa-arrow-down"></i>
</div>
<p>Withdraw</p>
</div>

<div class="action">
<div class="icon dephistory">
<i class="fa fa-clock-rotate-left"></i>
</div>
<p>Deposit history</p>
</div>

<div class="action">
<div class="icon withhistory">
<i class="fa fa-rotate-left"></i>
</div>
<p>Withdraw history</p>
</div>

</div>

</body>
</html>
