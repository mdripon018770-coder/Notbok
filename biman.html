<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator - Dual Bet Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #000; color: white; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden; }

        /* হেডার ও হিস্ট্রি */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #1b1c20; border-bottom: 1px solid #2c2d30; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #e11d48; font-weight: bold; font-style: italic; font-size: 20px; }
        .balance-box { color: #28a745; font-weight: bold; font-size: 16px; background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; }
        .history-bar { display: flex; gap: 8px; padding: 8px 15px; background: #050505; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; min-height: 40px; }
        .hist-badge { background: #1b1c20; color: #9c27b0; padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #333; }

        /* গেম সেকশন */
        .game-section { height: 260px; background: #000; position: relative; margin: 5px 10px; border-radius: 15px; overflow: hidden; border: 1px solid #222; flex-shrink: 0; }
        #gameCanvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        
        .timer-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; text-align: center; z-index: 20; display: none; }
        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 8px;}
        #progress-bar { width: 100%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; }

        .center-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none; }
        #multiplier { font-size: 55px; font-weight: 900; color: #fff; display: none; }
        #crash-msg { color: #ff3333; font-weight: bold; font-size: 24px; display: none; text-transform: uppercase; }

        .plane-icon { position: absolute; z-index: 100; pointer-events: none; left: 40px; top: 220px; }
        #aviatorImg { width: 90px; height: auto; filter: drop-shadow(0 0 15px #ff0000) brightness(1.3); }

        /* বেটিং প্যানেল */
        .controls-grid { padding: 5px 10px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .bet-card { background: #1b1c20; border-radius: 15px; padding: 10px; border: 1px solid #2c2d30; }
        
        .bet-controls-row { display: flex; gap: 10px; align-items: stretch; }
        .amount-adjustment { flex: 1; display: flex; flex-direction: column; gap: 5px; background: #000; border-radius: 10px; border: 1px solid #333; padding: 5px; }
        .input-group { display: flex; align-items: center; justify-content: space-between; padding: 2px 10px; }
        .input-group button { background: #222; border: 1px solid #444; color: #fff; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; }
        .input-group input { background: none; border: none; color: #fff; text-align: center; font-size: 18px; font-weight: bold; width: 60px; outline: none; }
        
        .quick-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .quick-chips button { background: #2c2d30; border: 1px solid #3d3e42; color: #bbb; padding: 3px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .btn-main { width: 110px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        .bet-btn { background: #28a745; color: white; box-shadow: 0 3px 0 #1e7e34; }
        .bet-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        .cash-btn { background: #ffc107; color: #000; display: none; box-shadow: 0 3px 0 #d39e00; }

        .all-bets-section { background: #141518; padding: 10px; border-top: 1px solid #222; }
        .bets-info { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 8px; }
        .user-list-header { display: flex; font-size: 10px; color: #555; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 5px;}
        .col-user { flex: 2; } .col-bet { flex: 1; text-align: center; } .col-win { flex: 1.5; text-align: right; }
        .scrollable-users { max-height: 250px; overflow-y: auto; scrollbar-width: none; }
        .user-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid #1a1b1e; font-size: 11px; }
        .user-name { color: #ccc; flex: 2; }
        .user-amt { color: #fff; font-weight: bold; flex: 1; text-align: center; }
        .user-multiplier { color: #28a745; font-weight: bold; flex: 1.5; text-align: right; }
        .multiplier-badge { background: rgba(40, 167, 69, 0.15); border: 1px solid #28a745; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Aviator</div>
        <div class="balance-box"><span id="main-balance">0.00</span> BDT</div>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div class="game-section">
        <canvas id="gameCanvas"></canvas>
        <div class="timer-container" id="timer-ui">
            <p style="font-size: 11px; font-weight: bold;">WAITING FOR NEXT ROUND</p>
            <div class="progress-bg"><div id="progress-bar"></div></div>
        </div>
        <div class="center-display">
            <h1 id="multiplier">1.00x</h1>
            <p id="crash-msg">FLEW AWAY!</p>
        </div>
        <div id="plane" class="plane-icon">
            <img src="https://raw.githubusercontent.com/mdripon018770-coder/Notbok/main/avtor.png" id="aviatorImg" alt="Aviator Plane">
        </div>
    </div>

    <div class="controls-grid">
        <div class="bet-card">
            <div class="bet-controls-row">
                <div class="amount-adjustment">
                    <div class="input-group">
                        <button onclick="changeAmt(1, -10)">-</button>
                        <input type="number" id="amt1" value="10" readonly>
                        <button onclick="changeAmt(1, 10)">+</button>
                    </div>
                    <div class="quick-chips">
                        <button onclick="setAmt(1, 100)">100</button><button onclick="setAmt(1, 200)">200</button>
                        <button onclick="setAmt(1, 500)">500</button><button onclick="setAmt(1, 1000)">1000</button>
                    </div>
                </div>
                <button class="btn-main bet-btn" id="b1" onclick="handleBet(1)">BET</button>
                <button class="btn-main cash-btn" id="c1" onclick="handleCashout(1)">CASHOUT<br><span id="w1" style="font-size: 10px;"></span></button>
            </div>
        </div>

        <div class="bet-card">
            <div class="bet-controls-row">
                <div class="amount-adjustment">
                    <div class="input-group">
                        <button onclick="changeAmt(2, -10)">-</button>
                        <input type="number" id="amt2" value="10" readonly>
                        <button onclick="changeAmt(2, 10)">+</button>
                    </div>
                    <div class="quick-chips">
                        <button onclick="setAmt(2, 100)">100</button><button onclick="setAmt(2, 200)">200</button>
                        <button onclick="setAmt(2, 500)">500</button><button onclick="setAmt(2, 1000)">1000</button>
                    </div>
                </div>
                <button class="btn-main bet-btn" id="b2" onclick="handleBet(2)">BET</button>
                <button class="btn-main cash-btn" id="c2" onclick="handleCashout(2)">CASHOUT<br><span id="w2" style="font-size: 10px;"></span></button>
            </div>
        </div>
    </div>

    <div class="all-bets-section">
        <div class="bets-info">
            <span>All Bets: <b id="total-bets">0</b></span>
            <span>Total: <b id="total-sum">0.00</b> BDT</span>
        </div>
        <div class="user-list-header">
            <span class="col-user">User</span>
            <span class="col-bet">Bet</span>
            <span class="col-win">Cash out</span>
        </div>
        <div class="scrollable-users" id="fakeUserList"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBCjxDS76NO2ib-hW_d9TmPPNIQFnjBO3k",
        authDomain: "wallet-app-73793.firebaseapp.com",
        projectId: "wallet-app-73793",
        databaseURL: "https://wallet-app-73793-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = localStorage.getItem("userId");

    window.balance = 0;

    if (currentUser) {
        onValue(ref(db, `users/${currentUser}/balance`), (snap) => {
            window.balance = parseFloat(snap.val() || 0);
            const display = document.getElementById("main-balance");
            if(display) display.innerText = window.balance.toFixed(2);
        });
    }

    window.syncBalanceWithFirebase = async function(newBalance) {
        if (currentUser) {
            await update(ref(db, `users/${currentUser}`), { balance: parseFloat(newBalance) });
        }
    }

    window.handleBet = async function(id) {
        if(!isWaiting) return;
        let amt = parseFloat(document.getElementById('amt' + id).value);
        if(window.balance < amt) return alert("Low Balance");
        
        window.balance -= amt; 
        document.getElementById("main-balance").innerText = window.balance.toFixed(2);
        await window.syncBalanceWithFirebase(window.balance);
        
        bets[id].active = true;
        bets[id].amt = amt;
        document.getElementById('b' + id).style.display = 'none';
        document.getElementById('c' + id).style.display = 'block';
    }

    window.handleCashout = async function(id) {
        if(!isFlying || !bets[id].active) return;
        
        let winAmt = bets[id].amt * currentMult;
        window.balance += winAmt;
        document.getElementById("main-balance").innerText = window.balance.toFixed(2);
        await window.syncBalanceWithFirebase(window.balance);
        
        bets[id].active = false;
        document.getElementById('b' + id).style.display = 'block';
        document.getElementById('c' + id).style.display = 'none';
        document.getElementById('b' + id).disabled = true;
    }
</script>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const plane = document.getElementById('plane');
    const multDisplay = document.getElementById('multiplier');
    const timerUI = document.getElementById('timer-ui');
    const progressBar = document.getElementById('progress-bar');
    const crashMsg = document.getElementById('crash-msg');
    const histBar = document.getElementById('historyBar');

    let currentMult = 1.00;
    let isFlying = false;
    let isWaiting = false;
    let gameInterval;
    let currentTotalBets = 0;
    let currentTotalCash = 0;
    const fakeNames = ["R*p*n", "M*h*m", "S*h*l", "A*k*f", "S*m*n", "N*y*m", "J*b*r", "F*h*m", "R*b*n", "I*m*t", "K*a*m", "L*t*f"];

    let bets = { 1: { active: false, amt: 0 }, 2: { active: false, amt: 0 } };

    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function changeAmt(id, val) {
        let input = document.getElementById('amt' + id);
        let cur = parseInt(input.value);
        if(cur + val >= 10) input.value = cur + val;
    }
    function setAmt(id, val) { document.getElementById('amt' + id).value = val; }

    function showFakeUsers() {
        const list = document.getElementById('fakeUserList');
        if(!list) return;
        list.innerHTML = "";
        for(let i=0; i<30; i++) {
            let name = fakeNames[Math.floor(Math.random()*fakeNames.length)] + Math.floor(Math.random()*99);
            let bet = (Math.random() * 500 + 10).toFixed(0);
            list.innerHTML += `<div class="user-row"><span class="user-name">${name}</span><span class="user-amt">${bet}</span><span class="user-multiplier" id="fake-m-${i}">-</span></div>`;
        }
    }

    function startTimer() {
        isWaiting = true; isFlying = false;
        let timeLeft = 10.0;
        currentTotalBets = Math.floor(Math.random() * 50) + 120;
        currentTotalCash = currentTotalBets * (Math.random() * 30 + 20);
        showFakeUsers();
        document.getElementById('b1').disabled = false;
        document.getElementById('b2').disabled = false;
        timerUI.style.display = 'block';
        multDisplay.style.display = 'none';
        crashMsg.style.display = 'none';
        plane.style.display = 'block';
        plane.style.transition = "none";
        plane.style.left = "40px";
        plane.style.top = (canvas.height - 40) + "px";
        plane.style.transform = "translate(-50%, -50%) rotate(0deg)";
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            progressBar.style.width = (timeLeft / 10) * 100 + "%";
            if(timeLeft > 0.5) {
                currentTotalBets += Math.floor(Math.random() * 10);
                currentTotalCash += (Math.random() * 1200);
                document.getElementById('total-bets').innerText = currentTotalBets;
                document.getElementById('total-sum').innerText = currentTotalCash.toLocaleString('en-US', {minimumFractionDigits: 2});
            }
            if (timeLeft <= 0) { clearInterval(timerInterval); startFlight(); }
        }, 100);
    }

    function startFlight() {
        isWaiting = false; isFlying = true;
        timerUI.style.display = 'none';
        multDisplay.style.display = 'block';
        multDisplay.style.color = 'white';
        currentMult = 1.00;
        document.getElementById('b1').disabled = true;
        document.getElementById('b2').disabled = true;
        let crashAt = (Math.random() * 5 + 1.1).toFixed(2); 

        gameInterval = setInterval(() => {
            currentMult += 0.012; 
            multDisplay.innerText = currentMult.toFixed(2) + "x";
            let prog = Math.min((currentMult - 1) / 10, 1); 
            let x = 40 + (prog * (canvas.width - 150));
            let y = (canvas.height - 40) - (Math.pow(prog, 0.3) * (canvas.height - 140));
            plane.style.left = x + 'px';
            plane.style.top = y + 'px';
            plane.style.transform = "translate(-50%, -50%) rotate(2deg)"; 
            renderCanvas(x, y);

            if(Math.random() > 0.94) {
                let idx = Math.floor(Math.random() * 30);
                let mEl = document.getElementById(`fake-m-${idx}`);
                if(mEl && mEl.innerText === "-") mEl.innerHTML = `<span class="multiplier-badge">${currentMult.toFixed(2)}x</span>`;
            }
            if(bets[1].active) document.getElementById('w1').innerText = (bets[1].amt * currentMult).toFixed(2);
            if(bets[2].active) document.getElementById('w2').innerText = (bets[2].amt * currentMult).toFixed(2);
            if (currentMult >= crashAt) finishGame(x, y);
        }, 35);
    }

    function renderCanvas(x, y) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let grad = ctx.createLinearGradient(0, canvas.height, 0, y);
        grad.addColorStop(0, "rgba(220, 0, 0, 0.9)"); grad.addColorStop(1, "transparent");
        ctx.beginPath(); ctx.moveTo(0, canvas.height);
        ctx.quadraticCurveTo(x/2, canvas.height, x, y + 15);
        ctx.lineTo(x, canvas.height); ctx.fillStyle = grad; ctx.fill();
        ctx.beginPath(); ctx.lineWidth = 6; ctx.strokeStyle = "#ff0000";
        ctx.moveTo(0, canvas.height); ctx.quadraticCurveTo(x/2, canvas.height, x, y + 15); ctx.stroke();
    }

    function finishGame(lx, ly) {
        clearInterval(gameInterval); isFlying = false;
        crashMsg.style.display = 'block';
        multDisplay.style.color = '#ff3333';
        resetPanels();
        let nb = document.createElement('span');
        nb.className = 'hist-badge'; nb.innerText = currentMult.toFixed(2) + 'x';
        histBar.prepend(nb);
        plane.style.transition = "all 0.5s ease-in";
        plane.style.left = (canvas.width + 300) + "px"; 
        plane.style.top = (ly - 100) + "px"; 
        setTimeout(startTimer, 3000);
    }

    function resetPanels() {
        bets[1].active = false; bets[2].active = false;
        document.getElementById('b1').style.display = 'block';
        document.getElementById('c1').style.display = 'none';
        document.getElementById('b2').style.display = 'block';
        document.getElementById('c2').style.display = 'none';
    }

    window.onload = startTimer;
</script>
</body>
</html>
